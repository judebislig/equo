services:
  app:
    container_name: equo-backend
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  frontend:
    container_name: equo-frontend
    build:
      context: ./equo-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: always